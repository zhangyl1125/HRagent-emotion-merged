apiVersion: 1
prune: true
datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 2000
  - name: HRagent Usage PostgreSQL
    uid: hragent-usage-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: $GRAFANA_USAGE_DB_USER
    editable: false
    jsonData:
      database: $GRAFANA_USAGE_DB_NAME
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: $GRAFANA_USAGE_DB_PASSWORD
