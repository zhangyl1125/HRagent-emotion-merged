name: hragent-05

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: hr_agent
      POSTGRES_USER: hr_agent
      POSTGRES_PASSWORD: hr_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_agent -d hr_agent"]
      interval: 10s
      timeout: 10s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6381:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: http://host.docker.internal:3128
        HTTPS_PROXY: http://host.docker.internal:3128
        NO_PROXY: localhost,127.0.0.1,::1,backend,frontend,postgres,redis
    env_file:
      - backend/config/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://hr_agent:hr_agent@postgres:5432/hr_agent
      REDIS_URL: redis://redis:6379/0
      WEB_CONCURRENCY: "4"
      UVICORN_LIMIT_CONCURRENCY: "200"
      DB_POOL_SIZE: "20"
      DB_MAX_OVERFLOW: "20"
      REDIS_MAX_CONNECTIONS: "50"
      HTTP_PROXY: http://host.docker.internal:3128
      HTTPS_PROXY: http://host.docker.internal:3128
      http_proxy: http://host.docker.internal:3128
      https_proxy: http://host.docker.internal:3128
      NO_PROXY: localhost,127.0.0.1,::1,backend,frontend,postgres,redis
      no_proxy: localhost,127.0.0.1,::1,backend,frontend,postgres,redis
    command: >
      sh -c "set -e;
      if [ -f data/employee_database/employees.xlsx ]; then
        python scripts/import_employees.py data/employee_database/employees.xlsx --quiet;
      else
        echo 'employees.xlsx not found, skip employee import';
      fi;
      uvicorn backend.main:app --host 0.0.0.0 --port 8111 --limit-concurrency $${UVICORN_LIMIT_CONCURRENCY:-200}"
    ports:
      - "8111:8111"
    volumes:
      - ./data:/app/data

  frontend:
    restart: unless-stopped
    build:
      context: frontend
      dockerfile: Dockerfile
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: http://host.docker.internal:3128
        HTTPS_PROXY: http://host.docker.internal:3128
        NO_PROXY: localhost,127.0.0.1,::1,backend,frontend,postgres,redis
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      - backend

volumes:
  postgres_data:
